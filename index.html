<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام إدارة سمان ههيا - ERP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- احتفظ بنفس أكواد الـ CSS الموجودة في الملف القديم هنا، مع إضافة كود الـ Loader التالي -->
    <style>
        /* ... ضف هنا كل الـ CSS القديم ... */
        
        /* --- Loading Spinner --- */
        #globalLoader {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(5px);
            z-index: 9999; justify-content: center; align-items: center; flex-direction: column;
        }
        .spinner {
            border: 5px solid var(--border); border-top: 5px solid var(--primary);
            border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loader-text { margin-top: 15px; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

    <!-- شاشة التحميل -->
    <div id="globalLoader">
        <div class="spinner"></div>
        <div class="loader-text">جاري المعالجة...</div>
    </div>

    <div id="toast"></div>

    <!-- شريط التنقل السفلي -->
    <nav class="bottom-nav">
        <!-- لاحظ أننا أزلنا onclick وأعطينا الأزرار data-page -->
        <div class="nav-item active" data-page="dashboard"><i class="fas fa-chart-pie"></i><span>الرئيسية</span></div>
        <div class="nav-item" data-page="incubator"><i class="fas fa-temperature-half"></i><span>تفريخ</span></div>
        <div class="nav-item" data-page="rearing"><i class="fas fa-kiwi-bird"></i><span>تربية</span></div>
        <div class="nav-item" data-page="freezer"><i class="fas fa-snowflake"></i><span>فريزر</span></div>
        <div class="nav-item" data-page="finance"><i class="fas fa-wallet"></i><span>حسابات</span></div>
        <div class="nav-item" data-page="settingsPage"><i class="fas fa-cog"></i><span>إعدادات</span></div>
    </nav>

    <!-- احتفظ بجميع الـ div الخاصة بالصفحات (dashboard, incubator, etc...) والـ Modals هنا كما هي -->

    <!-- استدعاء الملف الرئيسي كـ Module -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
